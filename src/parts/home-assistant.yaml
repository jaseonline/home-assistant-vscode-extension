          type: custom:auto-entities
          card:
            type: entities
          filter:
            template: >
              {% set pref = state_attr('media_player.sonos_main_bedroom',
              'friendly_name') %}

              [{% for e in
              device_entities(device_id('media_player.sonos_main_bedroom')) |
              sort(attribute='friendly_name') %}
                {'entity': '{{e}}',
                 'name': '{{ state_attr(e, 'friendly_name').removeprefix(pref) }}',
                },
              {% endfor %}]
            exclude:
              - options: {}
                domain: media_player
              - options: {}
                entity_id: sensor.*rx
              - options: {}
                entity_id: sensor.*tx
            include: []
        right_button: CLOSE
        popup_card_id: sonos_main_bedroom
        popup_card_all_views: true
        icon: ""
        right_button_variant: brand
        right_button_appearance: filled
        timeout_hide_progress: true
        card_mod:
          style: |
            :host {
              --ha-card-box-shadow: var(--shadow-inset);
            }
      - type: custom:navbar-card
        template: primary_nav
    title: Pop-ups
    visible:
      - user: 735e0c0a9e694ea594fe983ed25c80f2
      - user: fd6ecc4298104b41b0472644bf659738
      - user: 6f3265da51144dcfa9130185a8bfe602
      - user: ecf85b9da15c494da049bcc59edad20f
      - user: 4b9d812850e641c98bad4327336983b2
      - user: 5ce47e1c68bb4eb9bb52fcff2e5a6f5b
    layout:
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr))
      grid-template-rows: auto
      grid-gap: 2% 2%
      mediaquery:
        "(max-width: 600px)":
          grid-template-columns: repeat(1, minmax(0, 1fr))
        "(max-width: 800px)":
          grid-template-columns: repeat(2, minmax(0, 1fr))
        "(max-width: 9999px)":
          grid-template-columns: repeat(3, minmax(0, 1fr))
