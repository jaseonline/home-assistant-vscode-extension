        dynamicVolumeSlider: true
        heightPercentage: 100
        grouping:
          compact: false
          skipApplyButton: true
          hideUngroupAllButtons: false
          dontSwitchPlayer: true
          dontSortMembersOnTop: true
          disableMainSpeakers: false
          hideVolumes: false
          buttonColor: var(--ha-card-background)
        groups:
          compact: false
        entityNameRegexToReplace: "Sonos "
        storePlayerInSessionStorage: true
        doNotRememberSelectedPlayer: false
        changeVolumeOnSlide: true
        entityId: media_player.sonos_second_bedroom
        startSection: grouping
        adjustVolumeRelativeToMainPlayer: false
        footerHeight: 0
        mediaTitleReplacement: "Sonos "
        card_mod:
          style:
            # Retry point 1: sonos-grouping shadow root
            "sonos-grouping $":
              .: |
                div.wrapper {
                  flex-direction: column-reverse;
                  min-width: 100%;
                }
                div.list {
                  --secondary-background-color: var(--background-color);
                  box-sizing: border-box;
                  border-radius: var(--ha-card-border-radius, var(--ha-border-radius-lg));
                  border-width: var(--ha-card-border-width, 1px);
                  border-style: solid;
                  border-color: var(--ha-card-border-color, var(--divider-color, #e0e0e0));
                  color: var(--primary-text-color);
                  display: block;
                  transition: 0.3s ease-out;
                  position: relative;
                  &:hover { box-shadow: none; }
                  &:active { box-shadow: none; }
                }
              # Retry point 2: sonos-grouping-item-row shadow root
              # dict (not string) to allow both CSS via .: and further traversal to sonos-volume
              "sonos-grouping-item-row $":
                .: |
                  div.item {
                    border-radius: var(--ha-card-border-radius);
                    background: var(--ha-card-background);
                    border-color: var(--ha-card-border-color);
                    border-width: var(--ha-card-border-width);
                    border-style: var(--ha-card-border-style);
                    backdrop-filter: var(--ha-card-backdrop-filter);
                    box-shadow: var(--shadow-outset);
                    overflow: visible;
                    margin: 10px 10px 20px 10px;
                    width: 90%;
                    min-height: 70px;
                    padding: 0 10px 0 10px;
                    color: var(--primary-text-color);
                    &::before { display: none; }
                    --icon-box-shadow: 0.3rem 0.3rem 0.5rem black, -0.2rem -0.2rem 0.4rem rgba(51, 51, 51, 0.9);
                    transition: box-shadow 200ms ease, transform 180ms ease;
                  }
                  div.item:hover {
                    box-shadow: var(--shadow-inset);
                  }
                  div.item:active {
                    box-shadow: var(--shadow-inset);
                    transform: scale(0.99);
                  }
                  div.item[disabled] .icon {
                    --icon-box-shadow: inset 0.2rem 0.2rem 0.5rem black, inset -0.2rem -0.2rem 0.5rem rgba(51, 51, 51, 0.9);
                  }
                  .icon[selected] {
                    --icon-primary-color: var(--accent-color);
                  }
                  span.name {
                    color: var(--accent-color);
                    padding-left: 6px;
                  }
                "ha-icon $":
                  .: |
                    :host ha-svg-icon {
                      box-shadow: var(--icon-box-shadow);
                      padding: 5px;
                      border-radius: 50%;
                      color: var(--grey-3-color);
                    }
                  "ha-svg-icon $": |
                    :host path.primary-path {
                      d: path("M20 12a8 8 0 0 1-8 8 8 8 0 0 1-8-8 8 8 0 0 1 16 0");
                    }
                # Retry point 3: sonos-volume shadow root
                # Consolidates: $sonos-volume$: and $sonos-volume$ha-control-slider$:
                "sonos-volume $":
                  .: |
                    ha-control-slider {
                      --control-slider-thickness: 0.5rem;
                      --control-slider-background-opacity: 1;
                      --control-slider-background: transparent;
                    }
                  # Retry point 4: ha-control-slider shadow root
                  "ha-control-slider $": |
                    div.container {
                      width: 100%;
                      display: flex;
                      flex-direction: row;
                    }
                    div.slider {
                      box-shadow: var(--shadow-progress-bar-ridge);
                    }
                    div.slider>div.slider-track-bar {
                      background-image: var(--slider-gradient);
                    }
                    div.slider>div.slider-track-bar::after {
                      background-color: white;
                      height: 100%;
                    }
              # Retry point 2: sonos-grouping-actions shadow root
              "sonos-grouping-actions $":
                .: |
                  div.predefined-groups {
                    justify-content: space-around;
                    margin: 0 0 10px 0;
                  }
                # Retry point 3: sonos-grouping-button shadow root
                "sonos-grouping-button $":
                  # Retry point 4: ha-control-button shadow root (was: $ha-control-button$)
                  "ha-control-button $": |
                    button.button {
                      --control-button-border-radius: 10px;
                      --control-button-icon-color: var(--accent-color);
                      --control-button-background-color: var(--ha-card-background);
                      box-shadow: var(--shadow-outset);
                      &::before { display: none; }
                    }
                    button.button:active {
                      transform: translateY(-2px);
                      box-shadow: var(--shadow-inset);
                    }
                    button.button:hover {
                      transform: scale(0.98);
                      box-shadow: var(--shadow-inset);
                    }
            .: |
              ha-card {
                background: transparent;
                backdrop-filter: none;
                box-shadow: none;
                border: none;
              }
              ha-card::before { display: none; }
              ha-card:hover { box-shadow: none; }
              ha-card:active { 
                box-shadow: none;
                transform: none;
              }
