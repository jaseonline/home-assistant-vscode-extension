streamline_templates: !include /config/dashboards/streamline_templates.yaml
button_card_templates: !include_dir_named /config/dashboards/button_card_templates/
navbar-templates: !include navbar_templates.yaml

deep_press:
  enable_unsupported: true
swipe_nav:
  wrap: true
  animate: "none" # Valid options: 'none', 'slide', 'fade', 'flip'
  skip_tabs: "1, 3"
  prevent_default: true
  swipe_amount: 30

kiosk_mode:
  admin_settings:
    hide_header: true
    hide_sidebar: false
  non_admin_settings:
    hide_header: true
    hide_sidebar: true
    custom_width: 768

views:
  - title: Lighting
    type: custom:vertical-layout
    layout:
      mediaquery:
        "(max-width: 435px)":
          column_widths: 100%
          width: 100%
          max_cols: 1
          max_width: 100vw
          margin: 0
          padding: 0
        "(max-width: 800px)":
          column_widths: repeat(2, minmax(0, 1fr))
        "(max-width: 9999px)":
          column_widths: repeat(3, minmax(0, 1fr))
    path: lighting
    icon: mdi:home-lightbulb
    badges: []
    cards:
      - type: custom:streamline-card
        template: heading
        variables:
          - name: Living Room
          - left_entity: automation.routine_morning_lights_music
          - right_entity: switch.ice_machine
          - right_name: Ice
      - type: custom:streamline-card
        template: mushroom_light
        variables:
          - entity: light.living_room_spots
          - name: Spots
      - type: custom:streamline-card
        template: mushroom_light
        variables:
          - entity: light.sofa_lights
          - name: Sofa
        visibility:
          - condition: not
            conditions:
              - condition: state
                entity: light.living_room_spots
                state: "on"
      - type: custom:streamline-card
        template: mushroom_light
        variables:
          - entity: light.tv_lightstrip
          - name: TV Lightstrip
      - type: custom:streamline-card
        template: mushroom_light
        variables:
          - entity: light.pendant_lights
          - name: Hanging

      - type: custom:streamline-card
        template: heading
        variables:
          - name: Kitchen
          - right_entity: switch.adaptive_lighting_adaptive_kitchen
          - left_entity: automation.night_light_living_room_motion_on
          - left_name: Night
      - type: custom:streamline-card
        template: mushroom_light
        variables:
          - entity: light.kitchen_spots
          - name: Spots
      - type: custom:streamline-card
        template: mushroom_light
        variables:
          - entity: light.kitchen_lightstrip
          - name: Lightstrip
      - type: custom:layout-break

      - type: custom:streamline-card
        template: heading
        variables:
          - name: Dining
          - left_entity: automation.automation_dining_table_lights_on
          - left_name: Dining
          - right_entity: switch.adaptive_lighting_adaptive_dining
      - type: custom:streamline-card
        template: mushroom_light
        variables:
          - entity: light.dining_table
          - switchOnScene: scene.dining_table_read
          - name: Table
      - type: custom:streamline-card
        template: mushroom_light
        variables:
          - entity: light.floor_lamp
          - name: Floor Lamp
      - type: custom:streamline-card
        template: mushroom_light
        variables:
          - entity: light.bar_lights
          - name: Bar
          - apiId: barLights
          - switchOnScene: scene.bar_lights_scene

      - type: custom:streamline-card
        template: heading
        variables:
          - name: Main Bedroom
      - type: custom:streamline-card
        template: mushroom_light
        variables:
          entity: light.main_bedroom_spots
          name: Spots
      - type: custom:streamline-card
        template: mushroom_light
        variables:
          - entity: light.reading_lights
          - name: Reading
          - switchOnScene: scene.reading_lights
        visibility:
          - condition: or
            conditions:
              - condition: and
                conditions:
                  - condition: state
                    entity: light.jasons_bedside_light
                    state: "off"
                  - condition: state
                    entity: light.jordans_bedside_light
                    state: "off"
              - condition: and
                conditions:
                  - condition: state
                    entity: light.jasons_bedside_light
                    state: "on"
                  - condition: state
                    entity: light.jordans_bedside_light
                    state: "on"
      - type: custom:streamline-card
        template: mushroom_light
        variables:
          - entity: light.jasons_bedside_light
          - name: Jason's Bedside
          - switchOnScene: scene.reading_lights
        visibility:
          - condition: or
            conditions:
              - condition: and
                conditions:
                  - condition: state
                    entity: light.jasons_bedside_light
                    state: "off"
                  - condition: state
                    entity: light.jordans_bedside_light
                    state: "on"
              - condition: and
                conditions:
                  - condition: state
                    entity: light.jasons_bedside_light
                    state: "on"
                  - condition: state
                    entity: light.jordans_bedside_light
                    state: "off"
      - type: custom:streamline-card
        template: mushroom_light
        variables:
          - entity: light.jordans_bedside_light
          - name: Jordan's Bedside
          - switchOnScene: scene.reading_lights
        visibility:
          - condition: or
            conditions:
              - condition: and
                conditions:
                  - condition: state
                    entity: light.jasons_bedside_light
                    state: "off"
                  - condition: state
                    entity: light.jordans_bedside_light
                    state: "on"
              - condition: and
                conditions:
                  - condition: state
                    entity: light.jasons_bedside_light
                    state: "on"
                  - condition: state
                    entity: light.jordans_bedside_light
                    state: "off"
      - type: custom:layout-break

      - type: custom:streamline-card
        template: heading
        variables:
          - name: Second Bedroom
          - left_entity: switch.portable_radiator
          - right_entity: switch.sonos_living_room_night_sound
      - type: custom:streamline-card
        template: mushroom_light
        variables:
          - entity: light.second_bedroom_spots
          - name: Spots

      - type: custom:streamline-card
        template: heading
        variables:
          - name: Home Office
          - right_entity: switch.adaptive_lighting_adaptive_home_office
      - type: custom:streamline-card
        template: mushroom_light
        variables:
          - entity: light.office_lights
          - name: Desk
      - type: grid
        square: false
        columns: 3
        card_mod:
          style: |
            #root > * {
              width: 100%;
              display: flex;
              justify-content: center;
            }
        cards:
          - type: custom:button-card
            template: card_chip
            entity: switch.monitor
            variables:
              name: Monitor
          - type: custom:button-card
            template: card_chip
            entity: switch.printer
            variables:
              name: Printer
          - type: custom:button-card
            template: card_chip
            entity: switch.office_power_strip_label_maker
            variables:
              name: DYMO
          - type: custom:button-card
            template: card_chip
            entity: switch.wd_nas
            variables:
              name: EX2Ultra
          - type: custom:button-card
            template: card_chip
            entity: switch.external_hdd
            variables:
              name: ext HDD
          - type: custom:button-card
            template: card_chip
            entity: switch.utility_cupboard
            variables:
              name: Utility
      - type: custom:button-card
        template: card_title
        name: Guest Wi-Fi
      - type: custom:layout-card
        layout_type: custom:grid-layout
        layout:
          grid-template-rows: 1fr 1fr
          grid-template-columns: 2fr 3fr
          grid-template-areas: |
            "qr ssid"
            "qr pwd"
        cards:
          - type: custom:button-card
            entity: sensor.unifi_wifi_networks
            template: card_chip
            icon: mdi:wifi
            variables:
              name: |
                [[[
                  return entity?.attributes?.data[2]?.name;
                ]]]
            view_layout:
              grid-area: ssid
            card_mod:
              style: |
                :host {
                  justify-self: center;
                  align-self: center;
                }
          - type: custom:button-card
            entity: sensor.unifi_wifi_networks
            template: card_chip
            icon: mdi:lock
            variables:
              name: |
                [[[
                  return entity?.attributes?.data[2]?.password;
                ]]]
            view_layout:
              grid-area: pwd
            card_mod:
              style: |
                :host {
                  justify-self: center;
                  align-self: center;
                }
          - type: picture
            image_entity: image.wifi_qr_matilda_guest
            view_layout:
              grid-area: qr
            card_mod:
              style: |
                :host {
                  justify-self: center;
                  align-self: center;
                }
                ha-card.type-picture {
                  box-shadow: var(--shadow-outset);
                  border-radius: var(--ha-card-border-radius);
                }
                ha-card.type-picture img {
                  padding: 15px;
                  width: auto;
                }
      - type: custom:mushroom-entity-card
        entity: media_player.fire_tv_max_adb
        fill_container: false
        tap_action:
          action: more-info
        icon_type: none
        primary_info: state
        icon: ""
        card_mod:
          style: |
            :host {
              z-index: 90;
              position: absolute;
              top: 55px;
              left: 5px;
            }
        visibility:
          - condition: state
            entity: media_player.fire_tv_max_adb
            state_not: "off"
      - type: custom:mushroom-entity-card
        entity: binary_sensor.main_bedroom_sensor_motion
        fill_container: false
        icon_type: none
        primary_info: last-changed
        icon: ""
        card_mod:
          style: |
            :host ha-card {
              box-shadow: none;
              position: absolute;
              top: 5px;
              right: 5px;
              {% if states('binary_sensor.main_bedroom_sensor_motion') == 'on' %}
                --ha-card-background: rgba(255,0,0,1);
                animation: blinking 1s linear alternate infinite;
              {% endif %}
            }
            @keyframes blinking {
              0% {opacity: .2;}
              50% {opacity: .8;}
            }
      - type: custom:navbar-card
        routes:
          - url: /home-assistant/lighting
            label: Lighting
            icon: mdi:home-lightbulb
          - url: /home-assistant/sonos
            icon: mdi:music
            label: Music
          - url: /home-assistant/transport
            icon: mdi:train-bus
            label: Transport
          - url: /home-assistant/system
            icon: mdi:information-variant
            label: System
            hidden: |
              [[[
                return user.name != 'Jason Titter';
              ]]]
          - url: /home-assistant/weather
            icon: mdi:weather-partly-cloudy
            label: Weather
          - url: /home-assistant/climate
            icon: mdi:home-thermometer
            label: Climate
          - label: Reload Themes
            icon: mdi:refresh
            tap_action:
              action: call-service
              service: automation.trigger
              data:
                skip_condition: true
                entity_id: automation.reload_themes
            hidden: |
              [[[
                return user.name != 'Jason Titter';
              ]]]
          - label: More
            icon: mdi:dots-vertical
            hidden: |
              [[[
                return user.name != 'Jason Titter';
              ]]]
            tap_action:
              action: open-popup
            popup:
              - label: Network
                url: /home-assistant/network
                icon: mdi:network
              - label: Agent Screen
                url: /agent-screen
                icon: mdi:face-agent
              - label: Settings
                icon: mdi:cog
                url: /config
              - label: Dev Tools
                icon: mdi:hammer
                url: /config/developer-tools
              - label: Restart
                icon: mdi:power-cycle
                tap_action:
                  action: call-service
                  service: homeassistant.restart
                  service_data: {}
                  confirmation:
                    text: Are you sure you want to restart Home Assistant?
        desktop:
          show_labels: popup_only
          show_popup_label_backgrounds: true
          min_width: 768
          position: bottom
          hidden: |
            [[[
              return user.name != 'Jason Titter';
            ]]]
        mobile:
          show_labels: false
          show_popup_label_backgrounds: true
          mode: docked
          position: bottom
          hidden: |
            [[[
              return user.name != 'Jason Titter';
            ]]]
        layout:
          reflect_child_state: true
          auto_padding:
            enabled: true
            desktop_px: 100
            mobile_px: 80
            media_player_px: 100
        haptic:
          url: true
          tap_action: true
          hold_action: true
          double_tap_action: true
        media_player:
          players:
            - entity: media_player.sonos_second_bedroom
          desktop_position: bottom-right
          album_cover_background: false
          show: |-
            [[[
              const mediaPlayerState = states['media_player.sonos_second_bedroom'];
              const lastChanged = new Date(mediaPlayerState.last_changed);
              const now = Date.now();
              const fiveMinutes = 5 * 60 * 1000;

              // Display media player if it's playing OR paused in the last 5 minutes
              return (
                mediaPlayerState.state == 'playing' ||
                (mediaPlayerState.state == 'paused' &&
                  (now - lastChanged) <= fiveMinutes)
              );
            ]]]
        styles: |-
          .navbar {
            --navbar-box-shadow: var(--shadow-outset);
            --navbar-box-shadow-mobile-floating: var(--shadow-outset);
            --navbar-box-shadow-desktop: var(--shadow-outset);
            --navbar-primary-color: var(--grey-4-color);
            --navbar-background-color: var(--ha-card-background);
            --navbar-route-icon-size: 2rem;
            --navbar-route-image-size: 2rem;
            --navbar-border-radius: var(--ha-card-border-radius, 12px);
            --icon-primary-color: var(--primary-text-color);
          }
          .navbar.mobile {
            --navbar-box-shadow: none;
            --navbar-box-shadow-mobile-floating: none;
            --navbar-background-color: rgba(255, 255, 255, 0.1);
          }
          .navbar-card.desktop {
            height: 60px;
            border: none;
          }

          .navbar-card.mobile {
            height: 50px;
            border: none;
          }
          .navbar-card.mobile .route {
            overflow: hidden;
          }
          .navbar-card.mobile .button {
            --navbar-box-shadow: none;
            box-shadow: none;
          }
          ha-card.media-player.mobile {
            display: none;
          }
          .route {
            --icon-primary-color: var(--primary-text-color);
            border-radius: var(--navbar-border-radius);
            padding: 5px;
            overflow: visible;
          }

          .button {
            height: 40px;
            width: 40px;
            border-radius: var(--navbar-border-radius);
            background: var(--grey-card-color);
            transition: all 260ms ease;
            box-shadow: var(--shadow-button-outset);
          }

          .button:hover {
            --icon-primary-color: var(--secondary-accent-color);
            box-shadow: var(--shadow-button-inset);
            color: var(--secondary-accent-color);
            text-shadow: 0 0 15px var(--secondary-accent-color);
          }

          .button:active,
          .button.active {
            --icon-primary-color: var(--secondary-accent-color);
            box-shadow: var(--shadow-button-inset);
            background: var(--grey-card-color);
            text-shadow: 0 0 15px var(--secondary-accent-color);
          }

          .navbar-popup-backdrop {
            background-color: var(--dialog-scrim-color);
            backdrop-filter: var(--dialog-backdrop-filter);
          }

          .navbar-popup {
            padding: 0 0 20px 0;
            gap: 20px;
            background: none;
          }

          .popup-item {
            --icon-primary-color: var(--primary-text-color);
            overflow: visible;
            background: var(--grey-card-color);
            border-radius: var(--navbar-border-radius);
            text-align: left !important;
            width: 100%;
          }
          .popup-item.label-left .label {
            text-align: start;
          }
          .popup-item .button:active,
          .popup-item .button {
            box-shadow: var(--shadow-button-outset);
          }

          .media-player {
            background: var(--ha-card-background);
            box-shadow: var(--shadow-outset);
            height: 80px;
            border: none;
          }

          .media-player-button {
            height: 50px !important;
            width: 50px;
            border-radius: var(--navbar-border-radius);
            transition: all 260ms ease;
            box-shadow: var(--shadow-button-outset);
            background: none;
            --icon-primary-color: var(--primary-text-color);
          }

          .media-player-button:active,
          .media-player-button:hover {
            --icon-primary-color: var(--secondary-accent-color);
            box-shadow: var(--shadow-button-inset);
          }

          .media-player-button-play-pause:active {
            box-shadow: var(--shadow-button-inset);
          }

          .media-player .media-player-progress-bar {
            background: var(--ha-card-background);
            position: fixed;
            bottom: .5rem;
            left: 5.5rem;
            right: 9.5rem;
            height: .5rem;
            border-radius: 1rem;
            box-shadow: var(--progress-bar-shadow);
          }

          .media-player .media-player-progress-bar-fill {
            border-radius: 1rem;
            background: var(--slider-gradient);
            box-shadow: var(--progress-bar-shadow);
          }

          .media-player .media-player-image {
            background: var(--ha-card-background);
            border-radius: var(--navbar-border-radius);
            box-shadow: var(--shadow-outset);
          }

          .media-player-info {
            overflow: hidden;
          }

          .media-player-title,
          .media-player-artist {
            animation: marquee 4s linear infinite;
          }

          @keyframes marquee {
            to {
              transform: translateX(-100%);
            }
          }

          ha-card {
            border: none !important;
          }

          ha-card:active {
            --shadow-button-inset: none;
            transform: none !important;
          }

          ha-ripple {
            display: none !important;
          }







  - title: Transport
    path: transport
    icon: mdi:bus-clock
    type: custom:vertical-layout
    layout:
      mediaquery:
        "(max-width: 600px)":
          column_widths: repeat(1, minmax(0, 1fr))
        "(max-width: 800px)":
          column_widths: repeat(2, minmax(0, 1fr))
        "(max-width: 9999px)":
          column_widths: repeat(3, minmax(0, 1fr))
    badges: []
    cards:
      - type: custom:button-card
        template: card_title
        name: Tube Status
        variables:
          image: /local/images/tfl/roundel-underground.svg
          url: >-
            https://api.tfl.gov.uk/Line/Mode/tube,dlr,elizabeth-line/Status?detail=false
      - type: custom:layout-card
        layout_type: custom:grid-layout
        layout:
          margin: 0
          padding: 0
          grid-gap: 10px 10px
          grid-template-rows: repeat(1, minmax(0, 1fr))
          grid-template-columns: repeat(3, minmax(0, 1fr))
          mediaquery:
            "(max-width: 600px)":
              grid-template-rows: repeat(3, minmax(0, 1fr))
              grid-template-columns: repeat(2, minmax(0, 1fr))
        cards:
          - type: custom:button-card
            template: card_chip
            entity: sensor.tfl_eph_departues
            show_entity_picture: true
            show_icon: false
            tap_action:
              action: fire-dom-event
              browser_mod:
                service: browser_mod.popup
                data:
                  popup_card_id: eph_dep_northern_northbound
            entity_picture: /local/images/tfl/roundel-northern.svg
            variables:
              icon_color: rgb(var(--mush-rgb-northern))
              name: Northbound
          - type: custom:button-card
            template: card_chip
            entity: sensor.tfl_eph_departues
            show_entity_picture: true
            show_icon: false
            tap_action:
              action: fire-dom-event
              browser_mod:
                service: browser_mod.popup
                data:
                  popup_card_id: eph_dep_northern_southbound
            entity_picture: /local/images/tfl/roundel-northern.svg
            variables:
              icon_color: rgb(var(--mush-rgb-northern))
              name: Southbound
          - type: custom:button-card
            template: card_chip
            entity: sensor.tfl_eph_departues
            show_entity_picture: true
            show_icon: false
            tap_action:
              action: fire-dom-event
              browser_mod:
                service: browser_mod.popup
                data:
                  popup_card_id: eph_dep_bakerloo_northbound
            entity_picture: /local/images/tfl/roundel-bakerloo.svg
            variables:
              icon_color: rgb(var(--mush-rgb-bakerloo))
              name: Northbound
      - type: custom:layout-card
        layout_type: custom:grid-layout
        layout:
          grid-template-columns: repeat(4, minmax(0, 1fr))
          grid-template-rows: repeat(7, minmax(0, 1fr))
        cards:
          - type: custom:button-card
            template: card_tfl_status
            variables:
              id: bakerloo
            view_layout:
              grid-column: span 2
          - type: custom:button-card
            template: card_tfl_status
            variables:
              id: central
            view_layout:
              grid-column: span 2
          - type: custom:button-card
            template: card_tfl_status
            variables:
              id: circle
            view_layout:
              grid-column: span 2
          - type: custom:button-card
            template: card_tfl_status
            variables:
              id: district
            view_layout:
              grid-column: span 2
          - type: custom:button-card
            template: card_tfl_status
            variables:
              id: dlr
            view_layout:
              grid-column: span 2
          - type: custom:button-card
            template: card_tfl_status
            variables:
              id: elizabeth
            view_layout:
              grid-column: span 2
          - type: custom:button-card
            template: card_tfl_status
            variables:
              id: hammersmith_city
            view_layout:
              grid-column: span 2
          - type: custom:button-card
            template: card_tfl_status
            variables:
              id: jubilee
            view_layout:
              grid-column: span 2
          - type: custom:button-card
            template: card_tfl_status
            variables:
              id: metropolitan
            view_layout:
              grid-column: span 2
          - type: custom:button-card
            template: card_tfl_status
            variables:
              id: northern
            view_layout:
              grid-column: span 2
          - type: custom:button-card
            template: card_tfl_status
            variables:
              id: piccadilly
            view_layout:
              grid-column: span 2
          - type: custom:button-card
            template: card_tfl_status
            variables:
              id: victoria
            view_layout:
              grid-column: span 2
          - type: custom:button-card
            template: card_tfl_status
            variables:
              id: waterloo_city
            view_layout:
              grid-column: 2 / span 2
      - type: custom:layout-break
      - type: custom:button-card
        template: card_title
        name: National Rail EPH
        variables:
          image: /local/images/tfl/national-rail.svg
          url: >-
            https://api.tfl.gov.uk/Line/bakerloo,northern/Arrivals/940GZZLUEAC?direction=all
      - type: custom:mushroom-title-card
        alignment: center
        visibility:
          - condition: state
            entity: sensor.national_rail_elephant_departures
            state: No Service
        title: No Service
        card_mod:
          style: |
            h1.title {
              font-size: 18px;
            }
      - type: custom:mod-card
        card_mod:
          style:
            "tabbed-card $":
              # Retry point: mwc-tab shadow root (was: mwc-tab: with $: and $ mwc-tab-indicator $: sub-keys)
              "mwc-tab $":
                .: |
                  .mdc-tab__text-label {
                    background: var(--grey-3-color);
                    -webkit-background-clip: text;
                    background-clip: text;
                    color: transparent;
                    text-shadow: rgba(0, 0, 0, 0.5) -1px -2px 1px;
                  }
                # Retry point: mwc-tab-indicator shadow root (was: $ mwc-tab-indicator $)
                "mwc-tab-indicator $": |
                  :host .mdc-tab-indicator__content--underline {
                    border-color: transparent;
                  }
        card:
          type: custom:tabbed-card
          options:
            defaultTabIndex: 0
            isMinWidthIndicator: false
          styles:
            --mdc-tab-text-label-color-default: var(--grey-4-color)
            --mdc-tab-color-default: var(--grey-5-color)
            --mdc-ripple-press-opacity: 0
