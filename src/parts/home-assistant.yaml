              }
            # Retry point 1: sonos-player shadow root
            # Consolidates: sonos-player$:, sonos-player $ sonos-player-header $ sonos-progress$:,
            # and both sonos-player$ sonos-player-controls$ sonos-volume chains
            "sonos-player $":
              .: |
                div.container {
                  border-radius: 1.2rem;
                }
                sonos-player-header.header {
                  margin: 0;
                  border-radius: var(--ha-card-border-radius);
                  box-shadow: var(--mushroom-brightness-shadow);
                  overflow: hidden;
                  transform: scale(.9);
