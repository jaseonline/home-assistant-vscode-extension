                ha-icon-button.big-icon {
                  --mdc-icon-button-size: 3.5rem;
                  --mdc-icon-size: 3.5rem;
                }
              # Retry point 2: sonos-player-header shadow root
              "sonos-player-header $":
                # Retry point 3: sonos-progress shadow root (was: sonos-player $ sonos-player-header $ sonos-progress$)
                "sonos-progress $": |
                  :host div.progress-bar {
                    height: 0.5rem;
                    border-radius: 1.2rem;
                    background: var(--slider-gradient);
                  }
                  :host div.progress-bar:after {
                    background-color: white;
                    width: 20px;
                    margin: -10px;
                    height: 100%;
                  }
                  :host div.progress div.bar {
                    height: 7px;
                    margin: 5px 5px 0 5px;
                    padding: 0;
                    border-radius: 1.2rem;
                    box-shadow: var(--shadow-progress-bar-ridge);
                  }
              # Retry point 2: sonos-player-controls shadow root
              # Consolidates both: sonos-player$ sonos-player-controls$ sonos-volume: and sonos-player$ sonos-player-controls$ sonos-volume$:
              "sonos-player-controls $":
                # Retry point 3: sonos-volume element
                .: |
                  #mediaControls {
                    overflow: hidden;
                  }
                "sonos-volume":
                  $: |
                    ha-control-slider {
                      --control-slider-thickness: 0.5rem;
                      --control-slider-background: transparent;
                      --control-slider-background-opacity: 1;
                    }
                  # Retry point 4: ha-control-slider shadow root (was: sonos-volume$: ha-control-slider$:)
                "sonos-volume $":
                  "ha-control-slider":
                    $: |
                      div#slider.slider {
                        cursor: pointer;
                        height: 0.5rem;
                        border-radius: 1.2rem;
                        box-shadow: var(--shadow-progress-bar-ridge);
                      }
                      #slider>div.slider-track-bar.start {
                        background: var(--slider-gradient);
                        background-color: var(--grey-1-color);
                      }
                      #slider>div.slider-track-bar.start::after {
                        background-color: white;
                        --handle-size: 20px;
                        --handle-margin: -10px;
                        height: 100%;
                      }
