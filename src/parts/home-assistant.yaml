  - title: Sonos
    path: sonos
    type: custom:vertical-layout
    icon: mdi:music
    layout:
      grid-gap: 20px 20px
      mediaquery:
        "(max-width: 600px)":
          column_widths: repeat(1, minmax(0, 1fr))
        "(max-width: 800px)":
          column_widths: repeat(2, minmax(0, 1fr))
        "(max-width: 9999px)":
          column_widths: repeat(3, minmax(0, 1fr))
    badges: []
    cards:
      - type: custom:button-card
        template: card_title
        name: Speaker Controls
        styles:
          card:
            - height: 48px
      - type: custom:sonos-card
        sections:
          - groups
        entityNameRegexToReplace: "Sonos "
        storePlayerInSessionStorage: false # default is false. If set to true, the active player will be stored in the session storage instead of URL hash.
        doNotRememberSelectedPlayer: false # default is false. If set to true, the selected player will not be remembered in URL hash or session storage.
        heightPercentage: 100
        widthPercentage: 100
        groups:
          compact: false
        card_mod:
          # prepend: true
          style:
            .: |
              :host {
                margin: 0;
                --mdc-ripple-color: transparent;
                --secondary-background-color: var(--ha-card-background);
              }
              ha-card {
                background: transparent;
                backdrop-filter: none;
                box-shadow: none;
                border: none;
              }
              ha-card::before { display: none; }
              ha-card:hover { box-shadow: none; }
              ha-card:active { 
                box-shadow: none;
                transform: none;
              }
            # Retry point 1: sonos-groups shadow root
            "sonos-groups $":
              .: |
                mwc-list.list {
                  overflow: visible;
                  --mdc-list-vertical-padding: 20px;
                }
              # Retry point 2: mwc-list shadow root (was: sonos-groups$mwc-list$)
              "mwc-list $": |
                ul.mdc-deprecated-list {
                  padding: 0 20px 20px 20px;
                }
              # Retry point 2: sonos-group shadow root (was: sonos-groups $ sonos-group:)
              "sonos-group $":
                .: |
                  :host mwc-list-item {
                    height: 70px;
                    max-width: 100%;
                    margin: 20px;
                    background: var(--ha-card-background);
                    box-shadow: var(--shadow-outset);
                    transition: box-shadow 200ms ease, transform 180ms ease;
                  }
                  :host mwc-list-item:hover {
                    box-shadow: var(--shadow-inset);
                  }
                  :host mwc-list-item:active {
                    box-shadow: var(--shadow-inset);
                    transform: scale(0.99);
                  }
                  :host(:first-child) mwc-list-item {
                    margin-top: 10px;
                  }
                  :host mwc-list-item > div.row > div.text {
                    width: fit-content;
                    overflow: hidden;
                  }
                  :host mwc-list-item > div.row > div.text > span.song-title {
                    animation: marquee 4s linear infinite;
                  }
                  @keyframes marquee {
                    0% { transform: translate(0, 0); }
                    100% { transform: translate(-100%, 0); }
                  }
                "sonos-group-icons $":
                  "ha-icon $":
                    "ha-svg-icon $": |
                      :host {
                        border-radius: 50%;
                        padding: 4px;
                        box-shadow: var(--circle-shadow-inset);
                      }
                # Retry point 3: mwc-list-item shadow root (was: $mwc-list-item$)
                "mwc-list-item $": |
                  :host {
                    border: none;
                    box-shadow: var(--shadow-outset);
                    border-radius: var(--ha-card-border-radius);
                    background: var(--ha-card-background);
                  }
                  :host([activated]) {
                    --mdc-ripple-color: transparent !important;
                  }
                # Retry point 3: mwc-list-item element ÔåÆ already well-nested below
                "mwc-list-item":
                  $:
                    "mwc-ripple $": |
                      :host {
                        --mdc-ripple-color: var(--ha-card-background) !important;
                        box-shadow: var(--shadow-outset);
                      }
                      div.mdc-ripple-surface--primary--activated.mdc-ripple-upgraded {
                        box-shadow: var(--shadow-outset);
                        --mdc-ripple-color: var(--ha-card-background) !important;
                      }
                      div.mdc-ripple-surface.mdc-ripple-upgraded,
